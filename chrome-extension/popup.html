<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 260px;
    background: #0f0f0f;
    color: #f0f0f0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 16px;
  }
  h1 {
    font-size: 13px;
    font-weight: 500;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #1a1a1a;
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 12px;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; transition: background 0.3s; flex-shrink: 0; }
  .dot.active { background: #5DCAA5; box-shadow: 0 0 6px #5DCAA5; }
  .status-text { font-size: 13px; color: #888; }
  .status-text.active { color: #f0f0f0; }
  .gesture-list { background: #1a1a1a; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 8px; overflow: hidden; margin-bottom: 12px; }
  .gesture-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-bottom: 0.5px solid rgba(255,255,255,0.05); font-size: 12px; }
  .gesture-item:last-child { border-bottom: none; }
  .gesture-name { color: #888; }
  .gesture-key { background: #222; border: 0.5px solid rgba(255,255,255,0.15); border-radius: 4px; padding: 2px 7px; font-size: 11px; font-weight: 500; color: #f0f0f0; }
  .tip { font-size: 11px; color: #555; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<h1>🎮 Gesture Controller</h1>

<div class="status">
  <div class="dot" id="dot"></div>
  <div class="status-text" id="status-text">Python'a bağlanılıyor...</div>
</div>

<div class="gesture-list" id="gesture-list">
  <div class="gesture-item"><span class="gesture-name">Yükleniyor...</span></div>
</div>

<div class="tip">
  YouTube videosunu açık tutun<br>ve Python'u çalıştırın
</div>

<script src="popup.js"></script>
</body>
</html>
